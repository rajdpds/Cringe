<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06.</title>

  <!-- Google Font (minimal aesthetic) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Optional subtle overlay for vibe */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.15);
      pointer-events: none;
    }

    /* Optional tiny text (you can remove) */
    .label {
      position: absolute;
      bottom: 20px;
      right: 25px;
      color: #aaa;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

  </style>
</head>
<body>

  <div class="container">
    <!-- Replace image.jpg with your image file -->
    <img src="image.jpg" alt="Landing Image" class="main-image">
    <div class="overlay"></div>

    <!-- Optional aesthetic text -->
    <div class="label">06.</div>
  </div>

</body>
</html>
